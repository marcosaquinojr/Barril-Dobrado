<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login — Barril Dobrado</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛢️</text></svg>">
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">

        <div class="text-center mb-8">
            <div class="h-14 w-14 bg-gradient-to-br from-gray-700 to-gray-900 text-white rounded-xl flex items-center justify-center shadow-lg mx-auto mb-4">
                <i class="fas fa-database fa-lg"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Barril Dobrado</h1>
            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Perfis TOTVS sem complicação</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 text-sm rounded-lg border flex items-center gap-2
                        {{ 'bg-rose-50 text-rose-800 border-rose-200' if category == 'danger' else 'bg-emerald-50 text-emerald-800 border-emerald-200' }}">
                        <i class="fas {{ 'fa-times-circle' if category == 'danger' else 'fa-check-circle' }}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <form method="post" action="{{ url_for('login') }}" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Usuário</label>
                    <input type="text" name="username" required autofocus
                        class="w-full px-4 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:border-slate-400 focus:ring-0 outline-none transition"
                        placeholder="Digite seu usuário">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Senha</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:border-slate-400 focus:ring-0 outline-none transition"
                        placeholder="Digite sua senha">
                </div>
                <button type="submit"
                    class="w-full bg-slate-900 hover:bg-black text-white text-sm font-bold py-2.5 px-4 rounded-lg shadow-md transition-all hover:-translate-y-0.5">
                    Entrar <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">&copy; 2025 Barril Dobrado</p>
    </div>
</body>
</html>
