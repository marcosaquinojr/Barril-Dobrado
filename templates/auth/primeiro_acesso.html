<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Primeiro Acesso — Barril Dobrado</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛢️</text></svg>">
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">

        <div class="text-center mb-8">
            <div class="h-14 w-14 bg-gradient-to-br from-amber-500 to-amber-700 text-white rounded-xl flex items-center justify-center shadow-lg mx-auto mb-4">
                <i class="fas fa-key fa-lg"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Primeiro Acesso</h1>
            <p class="text-sm text-gray-500 mt-1">Crie uma senha pessoal para continuar</p>
        </div>

        <div id="alerta" class="hidden mb-4 p-3 text-sm rounded-lg border flex items-center gap-2"></div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <div class="mb-5 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800 flex items-start gap-2">
                <i class="fas fa-info-circle mt-0.5"></i>
                <span>Você está usando uma senha temporária. Defina uma senha pessoal para acessar o sistema.</span>
            </div>
            <form id="formSenha" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Nova Senha</label>
                    <input type="password" id="nova_senha" required minlength="6"
                        class="w-full px-4 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:border-slate-400 focus:ring-0 outline-none transition"
                        placeholder="Mínimo 6 caracteres">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Confirmar Senha</label>
                    <input type="password" id="confirmar_senha" required minlength="6"
                        class="w-full px-4 py-2.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:border-slate-400 focus:ring-0 outline-none transition"
                        placeholder="Repita a senha">
                </div>
                <button type="submit" id="btnSalvar"
                    class="w-full bg-slate-900 hover:bg-black text-white text-sm font-bold py-2.5 px-4 rounded-lg shadow-md transition-all hover:-translate-y-0.5">
                    Salvar e Entrar <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">&copy; 2025 Barril Dobrado</p>
    </div>

    <script>
        document.getElementById('formSenha').addEventListener('submit', async function(e) {
            e.preventDefault();
            const nova = document.getElementById('nova_senha').value;
            const confirmar = document.getElementById('confirmar_senha').value;
            const alerta = document.getElementById('alerta');
            const btn = document.getElementById('btnSalvar');

            function mostrarAlerta(msg, tipo) {
                alerta.className = `mb-4 p-3 text-sm rounded-lg border flex items-center gap-2 ${
                    tipo === 'erro'
                        ? 'bg-rose-50 text-rose-800 border-rose-200'
                        : 'bg-emerald-50 text-emerald-800 border-emerald-200'
                }`;
                alerta.innerHTML = `<i class="fas ${tipo === 'erro' ? 'fa-times-circle' : 'fa-check-circle'}"></i> ${msg}`;
                alerta.classList.remove('hidden');
            }

            if (nova !== confirmar) {
                mostrarAlerta('As senhas não coincidem.', 'erro');
                return;
            }
            if (nova.length < 6) {
                mostrarAlerta('A senha deve ter no mínimo 6 caracteres.', 'erro');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Salvando...';

            try {
                const res = await fetch('/primeiro_acesso', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nova_senha: nova })
                });
                const data = await res.json();
                if (data.success) {
                    mostrarAlerta('Senha definida! Redirecionando...', 'ok');
                    setTimeout(() => window.location.href = '/', 1200);
                } else {
                    mostrarAlerta(data.message || 'Erro ao salvar.', 'erro');
                    btn.disabled = false;
                    btn.innerHTML = 'Salvar e Entrar <i class="fas fa-arrow-right ml-2"></i>';
                }
            } catch {
                mostrarAlerta('Erro de conexão.', 'erro');
                btn.disabled = false;
                btn.innerHTML = 'Salvar e Entrar <i class="fas fa-arrow-right ml-2"></i>';
            }
        });
    </script>
</body>
</html>
